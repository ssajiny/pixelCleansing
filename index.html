<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,user-scalable=no"
    />
    <meta name="screen-orientation" content="portrait" />
    <title>Pixel Cleansing</title>
    <style>
      @font-face {
        font-family: "Maple";
        src: url("assets/font/Maplestory Light.ttf");
        font-weight: normal;
      }
      @font-face {
        font-family: "Maple";
        src: url("assets/font/Maplestory Bold.ttf");
        font-weight: bold;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Maple", sans-serif;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module" src="main.js"></script>
  </body>
</html>
