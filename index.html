<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,user-scalable=no"
    />
    <meta name="screen-orientation" content="landscape" />
    <title>Pixel Cleansing</title>
    <style>
      @font-face {
        font-family: "Maple";
        src: url("assets/font/Maplestory Light.ttf");
        font-weight: normal;
      }
      @font-face {
        font-family: "Maple";
        src: url("assets/font/Maplestory Bold.ttf");
        font-weight: bold;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Maple", sans-serif;
      }
      canvas {
        display: block;
      }
      #rotate-msg {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        font-size: 18px;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 999;
      }
      #rotate-msg span {
        font-size: 40px;
        margin-bottom: 12px;
      }
      @media (orientation: portrait) {
        #rotate-msg {
          display: flex;
        }
        canvas {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="rotate-msg">기기를 가로로 돌려주세요</div>
    <canvas id="c"></canvas>
    <script type="module" src="main.js"></script>
  </body>
</html>
